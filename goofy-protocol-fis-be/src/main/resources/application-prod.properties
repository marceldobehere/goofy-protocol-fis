# THIS IS JUST AN EXAMPLE OF A PROD CONFIG, WILL PROBABLY CHANGE
# Main Spring Settings
spring.application.name=goofy-protocol-fis-be
spring.output.ansi.enabled=always
spring.config.import=optional:file:.env[.properties]

# Main Server Settings
server.port=8080
spring.web.error.include-message=never

# Max Data sizes
goofy.auth.max-cache-bytes=60000000
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=60MB

# Main H2 DB
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false
spring.datasource.url=jdbc:h2:./fis_main.db;AUTO_SERVER=true
spring.datasource.username=sa
spring.datasource.password=sa

