# THIS IS JUST AN EXAMPLE OF A PROD CONFIG, WILL PROBABLY CHANGE
# Main Spring Settings
spring.application.name=goofy-protocol-fis-be
spring.output.ansi.enabled=always
spring.config.import=optional:file:.env[.properties]

# Main Server Settings
server.port=8080
spring.web.error.include-message=never
spring.devtools.add-properties=false

# General Data
goofy.general.frontend-url=https://fe.fis.rocc.systems
goofy.general.url=https://fis.rocc.systems
goofy.general.name=Goofy FIS Reference Implementation
goofy.general.description=Goofy FIS Reference Implementation for the Goofy Protocol
goofy.general.contact=Contact: real@mail.com
goofy.general.version=0.6.1
goofy.general.keypair.type=EC_C25519

# Storage
goofy.storage.use-temp-dir=false
goofy.storage.create-directories=false
goofy.storage.base-user-databases-path=user_databases
goofy.storage.base-user-buckets-path=user_buckets

# Registration
goofy.register.registrations-allowed=true
goofy.register.check-method=manual

# Max Data sizes
goofy.auth.max-cache-bytes=60000000
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=60MB

# Main H2 DB
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.h2.console.enabled=false
spring.datasource.url=jdbc:h2:./fis_main.db;AUTO_SERVER=true
spring.datasource.username=sa
spring.datasource.password=sa

# Swagger
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false


# Quotas
## Base User Quotas (General)
goofy.quota.base.general.max-name-size=100

## Base User Quotas (Identity Entries)
goofy.quota.base.identity.max-entries=5
goofy.quota.base.identity.max-service-entries=5

## Base User Quotas (Table Access)
goofy.quota.base.table.max-db-size=8000000
goofy.quota.base.table.max-field-size=100000
goofy.quota.base.table.max-tables=10
goofy.quota.base.table.max-cols=100
goofy.quota.base.table.max-rows=5000000
goofy.quota.base.table.max-permission-count=100
goofy.quota.base.table.max-lock-duration-seconds=60
goofy.quota.base.table-query.max-query-length=50000
goofy.quota.base.table-query.max-condition-count=50
goofy.quota.base.table-query.max-result-count=100

## Base User Quotas (Bucket Access)
goofy.quota.base.bucket.max-bucket-size=500000000
goofy.quota.base.bucket.max-item-size=50000000
goofy.quota.base.bucket.max-item-count=1000000
goofy.quota.base.bucket.max-permission-count=100
