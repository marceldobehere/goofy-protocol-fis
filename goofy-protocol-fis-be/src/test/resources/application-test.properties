# Main Spring Settings
spring.application.name=goofy-protocol-fis-be
spring.output.ansi.enabled=always
spring.config.import=optional:file:.env[.properties]

# Main Server Settings
server.port=8080
spring.web.error.include-message=always
spring.devtools.add-properties=true

# General Data
goofy.general.frontend-url=http://localhost:3000
goofy.general.url=http://localhost:8080
goofy.general.name=Goofy FIS Reference Implementation (Test)
goofy.general.description=Goofy FIS Reference Implementation for the Goofy Protocol
goofy.general.contact=Contact: real@mail.com
goofy.general.version=0.6.1-test
goofy.general.keypair.type=EC_C25519

# Storage
goofy.storage.use-temp-dir=true
goofy.storage.create-directories=true
goofy.storage.base-user-databases-path=user_data/databases
goofy.storage.base-user-buckets-path=user_data/buckets

# Registration
goofy.register.registrations-allowed=true
goofy.register.check-method=manual

# Max Data sizes
goofy.auth.max-cache-bytes=60000000
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=60MB

# Main H2 DB
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=true
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:db;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=sa

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true


# Quotas
## Base User Quotas (General)
goofy.quota.base.general.max-name-size=100

## Base User Quotas (Identity Entries)
goofy.quota.base.identity.max-entries=5
goofy.quota.base.identity.max-service-entries=3

## Base User Quotas (Table Access)
goofy.quota.base.table.max-db-size=5000000
goofy.quota.base.table.max-field-size=100000
goofy.quota.base.table.max-tables=5
goofy.quota.base.table.max-cols=20
goofy.quota.base.table.max-rows=150
goofy.quota.base.table.max-permission-count=10
goofy.quota.base.table.max-lock-duration-seconds=60
goofy.quota.base.table-query.max-query-length=5000
goofy.quota.base.table-query.max-condition-count=10
goofy.quota.base.table-query.max-result-count=100

## Base User Quotas (Bucket Access)
goofy.quota.base.bucket.max-bucket-size=100000
goofy.quota.base.bucket.max-item-size=10000
goofy.quota.base.bucket.max-item-count=10
goofy.quota.base.bucket.max-permission-count=10